[defaults]
inventory       = /home/claude/rear-manager/ansible/inventories/hosts.yml
roles_path      = /home/claude/rear-manager/ansible/roles
host_key_checking = False
stdout_callback = default
callbacks_enabled = timer
retry_files_enabled = False
gathering = smart
fact_caching = memory
forks = 10
timeout = 30

[privilege_escalation]
become       = False
become_method = sudo
become_user  = root

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[winrm]
